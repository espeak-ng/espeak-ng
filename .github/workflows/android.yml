name: Android

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-debug:
    runs-on: ubuntu-latest
    name: Build debug APK
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
      - name: make
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: android-debug.apk
          path: android/build/outputs/apk/debug/espeak-debug.apk
          retention-days: 5

  build-release:
    runs-on: ubuntu-latest
    name: Build release APK
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
      - name: make
        run: cd android && ./gradlew assembleRelease --no-daemon
      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: android-release.apk
          path: android/build/outputs/apk/release/espeak-release-unsigned.apk
          retention-days: 5

  test:
    runs-on: ubuntu-latest
    name: Instrumented tests
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 17
          cache: gradle
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86_64
          disable-animations: true
          script: bash android/ci-test.sh
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: android/build/reports/androidTests/
          retention-days: 5
